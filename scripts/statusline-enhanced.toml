# The Custom Startup — Enhanced Statusline Configuration
#
# Global:   ~/.config/the-agentic-startup/statusline-enhanced.toml
# Per-repo: <repo>/.claude/statusline-enhanced.toml  (overrides global)
#
# Per-repo config only needs the keys you want to override.

# Claude subscription plan — determines token budget limit per 5h window
# Options: pro | max5x | max20x
plan = "pro"

# Manual token limit override (optional — overrides plan default)
# Pro default: 44000 | Max 5x: 88000 | Max 20x: 220000
# token_limit = 44000

# Cache TTLs (seconds)
ccusage_cache_ttl = 60   # ccusage block data
git_cache_ttl     = 15   # git branch / dirty state

# Display toggles
show_token_bar   = true   # token budget bar (requires ccusage)
show_context_bar = true   # context window usage bar
show_cost        = false  # raw session cost (token bar already shows block cost)
show_duration    = true   # session duration
show_git         = true   # git branch + dirty indicator
show_remote_url  = true   # clickable OSC 8 hyperlink to remote repo

[thresholds.context]
warn   = 70   # % — switches to yellow
danger = 90   # % — switches to red

[thresholds.token]
warn   = 70   # % of plan token limit — yellow
danger = 90   # % of plan token limit — red
